project:
  name: "counter_sky130_local"
  run_id: "auto"
  output_dir: "./runs"

design:
  librelane_config_path: "./config.yaml"
  pdk: "sky130A"
  flow_mode: "flat"

execution:
  mode: "local"
  tool_timeout_seconds: 3600

intent:
  prompt: "Optimize timing closure for 8-bit counter on sky130"
  weights_hint:
    timing: 0.7
    area: 0.3

flow_control:
  budgets:
    physical_attempts_per_stage: 3
    cognitive_retries_per_attempt: 1
  deadlock_policy: "auto_relax"
  plateau_detection:
    window: 12
    min_delta_score: 0.001

parallel:
  enabled: false
  max_parallel_branches: 1
  max_parallel_jobs: 1

# Local LLM via LM Studio (http://127.0.0.1:1234)
llm:
  mode: "local"
  provider: "litellm"
  api_base: "http://127.0.0.1:1234/v1"
  models:
    master: "qwen3-32b-mlx@4bit"
    worker: "qwen3-32b-mlx@4bit"
    judge:
      - "qwen3-32b-mlx@4bit"
  temperature: 0.0
  seed: 42

# RAG knowledge base
knowledge:
  enabled: true
  db_path: "../../agenticlane/knowledge/chroma_db"
  top_k: 5
  score_threshold: 0.35
