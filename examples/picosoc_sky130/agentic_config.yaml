project:
  name: "picosoc_sky130"
  run_id: "auto"
  output_dir: "./runs"

design:
  librelane_config_path: "./config.yaml"
  pdk: "sky130A"
  flow_mode: "auto"  # flat | hierarchical | auto (prompts at start)

execution:
  mode: "local"
  tool_timeout_seconds: 7200

intent:
  prompt: "Optimize PicoSoC (RISC-V + UART + GPIO) on sky130 for balanced timing and area"
  weights_hint:
    timing: 0.6
    area: 0.4

flow_control:
  budgets:
    physical_attempts_per_stage: 3
    cognitive_retries_per_attempt: 1
  deadlock_policy: "auto_relax"
  plateau_detection:
    window: 12
    min_delta_score: 0.001

parallel:
  enabled: false
  max_parallel_branches: 1
  max_parallel_jobs: 1

# Gemini 2.5 Pro — set GOOGLE_API_KEY env var
llm:
  mode: "api"
  provider: "litellm"
  models:
    master: "gemini/gemini-2.5-pro"
    worker: "gemini/gemini-2.5-pro"
    judge:
      - "gemini/gemini-2.5-pro"
  temperature: 0.0
  seed: 42
